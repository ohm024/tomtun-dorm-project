<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | หอพัก ต้มตุ๋น</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">
    
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-teal-50 text-teal-600 mb-4 text-2xl">
                <i class="fas fa-building"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">หอพัก ต้มตุ๋น</h1>
            <p class="text-gray-400 text-xs font-bold tracking-widest mt-1">MANAGEMENT PORTAL</p>
        </div>
        
        {% if messages %}
    <div class="bg-red-50 text-red-500 text-sm p-3 rounded-lg mb-4 text-center border border-red-100 font-bold">
        {% for message in messages %}
            <i class="fas fa-exclamation-circle mr-1"></i> {{ message }}
        {% endfor %}
    </div>
{% endif %}

<form action="{% url 'login' %}" method="POST" class="space-y-5">
    {% csrf_token %}
    
    <div>
        <label class="block text-sm font-bold text-gray-700 mb-1">ชื่อผู้ใช้งาน</label>
        <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                <i class="fas fa-user"></i>
            </div>
            <input type="text" name="username" required class="w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 text-sm" placeholder="ชื่อผู้ใช้งาน">
        </div>
    </div>

    <div>
        <label class="block text-sm font-bold text-gray-700 mb-1">รหัสผ่าน</label>
        <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                <i class="fas fa-lock"></i>
            </div>
            <input type="password" name="password" required class="w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 text-sm" placeholder="••••••••">
        </div>
    </div>

    <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white py-3 rounded-lg font-bold transition-colors flex items-center justify-center">
        เข้าสู่ระบบ <i class="fas fa-sign-in-alt ml-2"></i>
    </button>
</form>
    </div>

</body>
</html>
