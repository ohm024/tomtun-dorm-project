<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | หอพัก ต้มตุ๋น</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">
    
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-teal-50 text-teal-600 mb-4 text-2xl">
                <i class="fas fa-building"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">หอพัก ต้มตุ๋น</h1>
            <p class="text-gray-400 text-xs font-bold tracking-widest mt-1">MANAGEMENT PORTAL</p>
        </div>
        
        <form action="{% url 'dashboard' %}" method="GET" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อผู้ใช้งาน</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i class="fas fa-user"></i>
                    </div>
                    <input type="text" value="admin_somchai" class="w-full bg-gray-50 border border-gray-200 text-gray-800 rounded-lg pl-10 px-4 py-2.5 focus:ring-teal-500 focus:border-teal-500 focus:bg-white transition-colors" placeholder="กรอกชื่อผู้ใช้งาน">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">รหัสผ่าน</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i class="fas fa-lock"></i>
                    </div>
                    <input type="password" value="password123" class="w-full bg-gray-50 border border-gray-200 text-gray-800 rounded-lg pl-10 px-4 py-2.5 focus:ring-teal-500 focus:border-teal-500 focus:bg-white transition-colors" placeholder="กรอกรหัสผ่าน">
                </div>
            </div>
            
            <div class="flex items-center justify-between pb-2">
                <label class="flex items-center text-sm text-gray-600 cursor-pointer">
                    <input type="checkbox" class="mr-2 text-teal-600 focus:ring-teal-500 rounded border-gray-300 cursor-pointer" checked> จำรหัสผ่าน
                </label>
                <a href="#" class="text-sm text-teal-600 hover:text-teal-700 hover:underline font-medium">ลืมรหัสผ่าน?</a>
            </div>
            
            <button type="submit" class="w-full bg-teal-600 text-white font-bold py-3 rounded-lg hover:bg-teal-700 transition-colors shadow-sm flex justify-center items-center">
                เข้าสู่ระบบ <i class="fas fa-sign-in-alt ml-2"></i>
            </button>
        </form>
    </div>

</body>
</html>
