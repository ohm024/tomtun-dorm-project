{% extends 'base.html' %}
{% block content %}
<div class="mb-6">
    <a href="{% url 'tenants' %}" class="text-teal-600 hover:text-teal-700 text-sm inline-block mb-2 font-medium">
        <i class="fas fa-arrow-left mr-1"></i> กลับไปหน้าจัดการผู้เช่า
    </a>
    <h2 class="text-2xl font-bold text-gray-800">เพิ่มผู้เช่าใหม่</h2>
</div>

<div class="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm max-w-2xl">
    <form method="POST">
    {% csrf_token %} <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">ชื่อ - นามสกุล *</label>
            <input type="text" name="full_name" required class="w-full border-gray-200 rounded-lg px-4 py-2 border" placeholder="เช่น นายสมชาย ใจดี">
        </div>
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">เลขประจำตัวประชาชน *</label>
            <input type="text" name="id_card" required class="w-full border-gray-200 rounded-lg px-4 py-2 border" placeholder="1-xxxx-xxxxx-xx-x">
        </div>
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">เบอร์โทรศัพท์ *</label>
            <input type="text" name="phone" required class="w-full border-gray-200 rounded-lg px-4 py-2 border" placeholder="08x-xxx-xxxx">
        </div>
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">อีเมล / LINE ID</label>
            <input type="text" name="email_line" class="w-full border-gray-200 rounded-lg px-4 py-2 border" placeholder="email@example.com / Line ID">
        </div>
    </div>

    <div class="mt-8">
        <h3 class="text-teal-600 font-bold mb-4"><i class="fas fa-key mr-2"></i> ข้อมูลการเช่า</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">ห้องพัก (เฉพาะห้องที่ว่าง) *</label>
                <select name="room" required class="w-full border-gray-200 rounded-lg px-4 py-2 border">
                    <option value="">-- เลือกห้องพักที่ว่าง --</option>
                    {% for room in rooms %}
                        <option value="{{ room.id }}">ห้อง {{ room.room_number }} (ชั้น {{ room.floor }})</option>
                    {% empty %}
                        <option value="" disabled>ไม่มีห้องว่างในขณะนี้</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">วันที่เข้าพัก *</label>
                <input type="date" name="start_date" required class="w-full border-gray-200 rounded-lg px-4 py-2 border">
            </div>
        </div>
    </div>

    <div class="flex justify-end gap-3 mt-8">
        <a href="{% url 'tenants' %}" class="px-6 py-2 rounded-lg border border-gray-200">ยกเลิก</a>
        <button type="submit" class="bg-teal-600 text-white px-8 py-2 rounded-lg font-bold">
            <i class="fas fa-save mr-2"></i> บันทึกข้อมูล
        </button>
    </div>
</form>
</div>
{% endblock %}
