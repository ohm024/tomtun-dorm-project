{% extends 'base.html' %}

{% block content %}
<div class="mb-6">
    <a href="{% url 'maintenance' %}" class="text-teal-600 hover:text-teal-700 text-sm mb-2 inline-block font-medium">
        <i class="fas fa-arrow-left mr-1"></i> กลับไปหน้าระบบแจ้งซ่อม
    </a>
    <h2 class="text-2xl font-bold text-gray-800">แก้ไขรายการแจ้งซ่อม / อัปเดตสถานะ</h2>
    <p class="text-gray-500 text-sm mt-1">ห้อง {{ req.room.room_number }} - ผู้แจ้ง: {{ req.reporter }}</p>
</div>

<div class="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm max-w-3xl">
    <form action="{% url 'edit_maintenance' req.id %}" method="POST" class="space-y-6">
        {% csrf_token %}
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="md:col-span-2 border-b border-gray-100 pb-2 flex justify-between items-center">
                <h3 class="text-lg font-bold text-gray-800"><i class="fas fa-edit text-teal-600 mr-2"></i>อัปเดตข้อมูล</h3>
                <span class="text-sm text-gray-500">วันที่แจ้ง: {{ req.created_at|date:"d/m/Y H:i" }}</span>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">สถานะงานซ่อม <span class="text-red-500">*</span></label>
                <select name="status" class="w-full text-sm border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 px-4 py-2.5 border bg-white" required>
                    <option value="pending" {% if req.status == 'pending' %}selected{% endif %}>รอดำเนินการ</option>
                    <option value="in_progress" {% if req.status == 'in_progress' %}selected{% endif %}>กำลังซ่อม</option>
                    <option value="waiting" {% if req.status == 'waiting' %}selected{% endif %}>รออะไหล่</option>
                    <option value="completed" {% if req.status == 'completed' %}selected{% endif %}>เสร็จสิ้น</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">ความเร่งด่วน <span class="text-red-500">*</span></label>
                <select name="urgency" class="w-full text-sm border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 px-4 py-2.5 border bg-white" required>
                    <option value="normal" {% if req.urgency == 'normal' %}selected{% endif %}>ปกติ (ดำเนินการภายใน 1-3 วัน)</option>
                    <option value="urgent" {% if req.urgency == 'urgent' %}selected{% endif %}>ด่วน (ดำเนินการภายใน 24 ชม.)</option>
                    <option value="very_urgent" {% if req.urgency == 'very_urgent' %}selected{% endif %}>ด่วนมาก (ดำเนินการทันที)</option>
                </select>
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-bold text-gray-700 mb-1">หัวข้อปัญหา <span class="text-red-500">*</span></label>
                <input type="text" name="title" value="{{ req.title }}" class="w-full text-sm border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 px-4 py-2.5 border bg-gray-50" required>
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-bold text-gray-700 mb-1">รายละเอียดเพิ่มเติม</label>
                <textarea name="description" class="w-full text-sm border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 px-4 py-2.5 border bg-gray-50" rows="3">{{ req.description }}</textarea>
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-bold text-gray-700 mb-1">วันที่สะดวกให้เข้าซ่อม</label>
                <input type="date" name="appointment_date" value="{{ req.appointment_date|date:'Y-m-d' }}" class="w-full md:w-1/2 text-sm border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 px-4 py-2.5 border bg-gray-50">
            </div>
        </div>

        <div class="pt-6 flex justify-end space-x-3 mt-8 border-t border-gray-100">
            <a href="{% url 'maintenance' %}" class="px-5 py-2.5 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors font-bold text-sm">
                ยกเลิก
            </a>
            <button type="submit" class="bg-teal-600 hover:bg-teal-700 text-white px-6 py-2.5 rounded-lg font-bold transition-colors shadow-sm text-sm flex items-center">
                <i class="fas fa-save mr-2"></i> บันทึกการเปลี่ยนแปลง
            </button>
        </div>
        
    </form>
</div>
{% endblock %}
