{% extends 'base.html' %}

{% block content %}
<div class="mb-6">
    <a href="{% url 'billing' %}" class="text-teal-600 hover:text-teal-700 text-sm mb-2 inline-block font-medium">
        <i class="fas fa-arrow-left mr-1"></i> กลับไปหน้าบิลค่าเช่า
    </a>
    <h2 class="text-2xl font-bold text-gray-800">สร้างบิลใหม่ / ออกใบแจ้งหนี้</h2>
    <p class="text-gray-500 text-sm mt-1">คำนวณค่าเช่า ค่าน้ำ ค่าไฟ และค่าบริการอื่นๆ ประจำเดือน</p>
</div>

<div class="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm max-w-4xl">
    <form action="{% url 'add_bill' %}" method="POST" class="space-y-6">
        {% csrf_token %} <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="md:col-span-2 border-b border-gray-100 pb-2">
                <h3 class="text-lg font-bold text-gray-800"><i class="fas fa-info-circle text-teal-600 mr-2"></i>ข้อมูลพื้นฐาน</h3>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">ห้องพัก <span class="text-red-500">*</span></label>
                <select name="room" class="w-full text-sm border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 px-4 py-2.5 border bg-white" required>
                    <option value="">-- เลือกห้องพัก --</option>
                    {% for t in active_tenants %}
            <option value="{{ t.room.id }}">{{ t.room.room_number }} - คุณ{{ t.first_name }} {{ t.last_name }}</option>
        {% endfor %}
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">รอบบิลประจำเดือน <span class="text-red-500">*</span></label>
                <input type="month" name="billing_month" class="w-full text-sm border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 px-4 py-2.5 border bg-gray-50" required>
            </div>

            <div class="md:col-span-2 border-b border-gray-100 pb-2 mt-4">
                <h3 class="text-lg font-bold text-gray-800"><i class="fas fa-file-invoice-dollar text-teal-600 mr-2"></i>รายการคำนวณ</h3>
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-bold text-gray-700 mb-1">ค่าเช่าห้องพัก (บาท) <span class="text-red-500">*</span></label>
                <input type="number" name="rent_amount" class="w-full text-sm border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 px-4 py-2.5 border bg-gray-50" placeholder="เช่น 4500" required>
            </div>

            <div class="bg-blue-50/50 p-4 rounded-xl border border-blue-100">
                <label class="block text-sm font-bold text-blue-800 mb-3"><i class="fas fa-tint mr-1"></i> มิเตอร์น้ำ (หน่วย)</label>
                <div class="space-y-3">
                    <div>
                        <span class="text-xs text-gray-500 block mb-1">เลขจดครั้งก่อน</span>
                        <input type="number" name="water_prev" class="w-full text-sm border-gray-300 rounded-lg px-3 py-2 border bg-white" placeholder="0" required>
                    </div>
                    <div>
                        <span class="text-xs text-gray-500 block mb-1">เลขจดครั้งนี้</span>
                        <input type="number" name="water_curr" class="w-full text-sm border-gray-300 rounded-lg px-3 py-2 border bg-white" placeholder="0" required>
                    </div>
                </div>
            </div>

            <div class="bg-yellow-50/50 p-4 rounded-xl border border-yellow-100">
                <label class="block text-sm font-bold text-yellow-800 mb-3"><i class="fas fa-bolt mr-1"></i> มิเตอร์ไฟ (หน่วย)</label>
                <div class="space-y-3">
                    <div>
                        <span class="text-xs text-gray-500 block mb-1">เลขจดครั้งก่อน</span>
                        <input type="number" name="elec_prev" class="w-full text-sm border-gray-300 rounded-lg px-3 py-2 border bg-white" placeholder="0" required>
                    </div>
                    <div>
                        <span class="text-xs text-gray-500 block mb-1">เลขจดครั้งนี้</span>
                        <input type="number" name="elec_curr" class="w-full text-sm border-gray-300 rounded-lg px-3 py-2 border bg-white" placeholder="0" required>
                    </div>
                </div>
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-bold text-gray-700 mb-1">ค่าส่วนกลาง / ค่าใช้จ่ายอื่นๆ (บาท)</label>
                <input type="number" name="service_fee" class="w-full text-sm border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 px-4 py-2.5 border bg-gray-50" placeholder="เช่น 300" value="0">
            </div>
            
            <div class="md:col-span-2">
                <label class="block text-sm font-bold text-gray-700 mb-1">กำหนดชำระภายในวันที่ <span class="text-red-500">*</span></label>
                <input type="date" name="due_date" class="w-full md:w-1/2 text-sm border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 px-4 py-2.5 border bg-gray-50" required>
            </div>
        </div>

        <div class="pt-6 flex justify-end space-x-3 mt-8 border-t border-gray-100">
            <a href="{% url 'billing' %}" class="px-5 py-2.5 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors font-bold text-sm">
                ยกเลิก
            </a>
            <button type="submit" class="bg-teal-600 hover:bg-teal-700 text-white px-6 py-2.5 rounded-lg font-bold transition-colors shadow-sm text-sm flex items-center">
                <i class="fas fa-paper-plane mr-2"></i> สร้างและส่งบิล
            </button>
        </div>
        
    </form>
</div>
{% endblock %}
