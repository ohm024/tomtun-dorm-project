{% extends 'base.html' %}

{% block content %}
<div class="mb-6">
    <a href="{% url 'contracts' %}" class="text-teal-600 hover:text-teal-700 text-sm mb-2 inline-block font-medium">
        <i class="fas fa-arrow-left mr-1"></i> กลับไปหน้ารายการสัญญา
    </a>
    <h2 class="text-2xl font-bold text-gray-800">ทำสัญญาเช่า / จองห้องพัก</h2>
    <p class="text-gray-500 text-sm mt-1">กรอกข้อมูลผู้เช่าและรายละเอียดการทำสัญญาใหม่</p>
</div>

<div class="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm max-w-3xl">
    <form action="" method="POST" class="space-y-6">
        {% csrf_token %}
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="md:col-span-2 border-b border-gray-100 pb-2">
                <h3 class="text-lg font-bold text-gray-800"><i class="fas fa-file-signature text-teal-600 mr-2"></i>ข้อมูลเอกสารและห้องพัก</h3>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">ประเภทเอกสาร <span class="text-red-500">*</span></label>
                <select name="contract_type" class="w-full text-sm border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 px-4 py-2.5 border bg-white" required>
                    <option value="lease">ทำสัญญาเช่า (เข้าพักเลย)</option>
                    <option value="booking">จองห้องพัก (รอย้ายเข้า)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">เลือกห้องพักที่ว่าง <span class="text-red-500">*</span></label>
                <select name="room_id" class="w-full text-sm border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 px-4 py-2.5 border bg-white" required>
                    <option value="">-- เลือกห้องพัก --</option>
                    {% for room in available_rooms %}
                        <option value="{{ room.id }}">ห้อง {{ room.room_number }} ({{ room.get_room_type_display|default:room.room_type }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="md:col-span-2 border-b border-gray-100 pb-2 mt-4">
                <h3 class="text-lg font-bold text-gray-800"><i class="fas fa-user text-teal-600 mr-2"></i>ข้อมูลผู้เช่าและรายละเอียดสัญญา</h3>
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-bold text-gray-700 mb-1">ชื่อ-นามสกุล ผู้เช่า/ผู้จอง <span class="text-red-500">*</span></label>
                <input type="text" name="tenant_name" class="w-full text-sm border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 px-4 py-2.5 border bg-gray-50" placeholder="เช่น นายสมชาย ใจดี" required>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">วันที่เริ่มต้น <span class="text-red-500">*</span></label>
                <input type="date" name="start_date" class="w-full text-sm border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 px-4 py-2.5 border bg-white" required>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">วันที่สิ้นสุด (ถ้ามี)</label>
                <input type="date" name="end_date" class="w-full text-sm border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 px-4 py-2.5 border bg-white">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">เงินมัดจำ / เงินประกัน (บาท) <span class="text-red-500">*</span></label>
                <input type="number" name="deposit" class="w-full text-sm border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 px-4 py-2.5 border bg-gray-50" placeholder="เช่น 5000" required>
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-bold text-gray-700 mb-1">หมายเหตุเพิ่มเติม</label>
                <textarea name="notes" class="w-full text-sm border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 px-4 py-2.5 border bg-gray-50" rows="2" placeholder="รายละเอียดเพิ่มเติม (ถ้ามี)"></textarea>
            </div>
        </div>

        <div class="pt-6 flex justify-end space-x-3 mt-8">
            <a href="{% url 'contracts' %}" class="px-5 py-2.5 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors font-bold text-sm">
                ยกเลิก
            </a>
            <button type="submit" class="bg-teal-600 hover:bg-teal-700 text-white px-6 py-2.5 rounded-lg font-bold transition-colors shadow-sm text-sm flex items-center">
                <i class="fas fa-save mr-2"></i> บันทึกข้อมูล
            </button>
        </div>
        
    </form>
</div>
{% endblock %}
