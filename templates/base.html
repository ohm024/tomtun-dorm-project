<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หอพัก ต้มตุ๋น Management Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* โหลดฟอนต์ภาษาไทยให้เหมือนใน UI */
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #f4f7f6; }
        .sidebar-link { display: flex; align-items: center; padding: 0.75rem 1rem; color: #4b5563; border-radius: 0.5rem; margin-bottom: 0.25rem; transition: all 0.2s; }
        .sidebar-link:hover, .sidebar-link.active { background-color: #f0fdfa; color: #0d9488; font-weight: 500; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col justify-between z-10">
        <div>
            <div class="p-6">
                <h1 class="text-xl font-bold text-teal-800"><i class="fas fa-building mr-2"></i>หอพัก ต้มตุ๋น</h1>
                <p class="text-xs text-gray-500 mt-1">MANAGEMENT PORTAL</p>
            </div>
            <nav class="px-4 space-y-1">
                <a href="{% url 'dashboard' %}" class="sidebar-link"><i class="fas fa-th-large w-6"></i> แดชบอร์ด</a>
                <a href="{% url 'rooms' %}" class="sidebar-link"><i class="fas fa-door-open w-6"></i> จัดการห้องพัก</a>
                <a href="{% url 'contracts' %}" class="sidebar-link"><i class="fas fa-file-contract w-6"></i> การจองและสัญญา</a>
                <a href="{% url 'check_in_out' %}" class="sidebar-link"><i class="fas fa-sign-in-alt w-6"></i> เช็คอิน/เช็คเอาท์</a>
                
                <a href="{% url 'tenants' %}" class="sidebar-link"><i class="fas fa-users w-6"></i> จัดการผู้เช่า</a>
                
                <a href="#" class="sidebar-link"><i class="fas fa-file-invoice-dollar w-6"></i> บิลค่าเช่า</a>
                <a href="#" class="sidebar-link"><i class="fas fa-wrench w-6"></i> แจ้งซ่อม</a>
            </nav>
        </div>
        <div class="p-4 border-t border-gray-100">
            <a href="#" class="sidebar-link"><i class="fas fa-cog w-6"></i> การตั้งค่า</a>
            <a href="#" class="sidebar-link text-red-500 hover:bg-red-50 hover:text-red-600"><i class="fas fa-sign-out-alt w-6"></i> ออกจากระบบ</a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 z-10">
            <div class="relative w-96">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i class="fas fa-search"></i></span>
                <input type="text" class="w-full bg-gray-100 rounded-full py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-teal-500 text-sm" placeholder="ค้นหาห้องพัก, ชื่อผู้เช่า...">
            </div>
            <div class="flex items-center space-x-4">
                <button class="text-gray-400 hover:text-gray-600"><i class="far fa-bell text-lg"></i></button>
                <div class="flex items-center space-x-3 border-l pl-4">
                    <div class="text-right">
                        <p class="text-sm font-semibold text-gray-800">สมชาย ใจดี</p>
                        <p class="text-xs text-gray-500">ADMINISTRATOR</p>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=สมชาย+ใจดี&background=0d9488&color=fff" class="w-10 h-10 rounded-full" alt="Profile">
                </div>
            </div>
        </header>
        
        <div class="flex-1 overflow-y-auto p-8">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
