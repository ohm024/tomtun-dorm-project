{% extends 'base.html' %}

{% block content %}
<div class="mb-6">
    <a href="{% url 'check_in_out' %}" class="text-teal-600 hover:text-teal-700 text-sm mb-2 inline-block font-medium">
        <i class="fas fa-arrow-left mr-1"></i> กลับไปหน้าเช็คอิน/เช็คเอาท์
    </a>
    <h2 class="text-2xl font-bold text-gray-800">ทำรายการเช็คเอาท์ (Check-out)</h2>
    <p class="text-gray-500 text-sm mt-1">บันทึกการคืนห้อง ตัดค่าน้ำค่าไฟ และคำนวณเงินประกันคืน</p>
</div>

<div class="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm max-w-3xl">
    <form action="{% url 'add_checkout' %}" method="POST" class="space-y-6">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">เลือกห้องพัก <span class="text-red-500">*</span></label>
                <select name="room" required class="w-full text-sm border-gray-300 rounded-lg focus:ring-red-500 px-4 py-2.5 border bg-white">
                    <option value="">-- เลือกห้องพักที่กำลังเช่า --</option>
                    {% for room in rooms %}
                        <option value="{{ room.id }}">{{ room.room_number }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">วันที่เช็คเอาท์ <span class="text-red-500">*</span></label>
                <input type="datetime-local" name="transaction_date" required class="w-full text-sm border-gray-300 rounded-lg focus:ring-red-500 px-4 py-2.5 border bg-white">
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-bold text-gray-700 mb-1">ชื่อผู้เช่าที่คืนห้อง <span class="text-red-500">*</span></label>
                <input type="text" name="tenant_name" required class="w-full text-sm border-gray-300 rounded-lg focus:ring-red-500 px-4 py-2.5 border bg-white" placeholder="กรอกชื่อ-นามสกุล">
            </div>

            <div class="bg-blue-50/50 p-4 rounded-xl border border-blue-100">
                <label class="block text-sm font-bold text-blue-800 mb-2"><i class="fas fa-tint mr-1"></i> เลขมิเตอร์น้ำวันออก</label>
                <input type="number" name="water_meter" class="w-full text-sm border-gray-300 rounded-lg px-3 py-2 border bg-white" placeholder="หน่วย" required>
            </div>

            <div class="bg-yellow-50/50 p-4 rounded-xl border border-yellow-100">
                <label class="block text-sm font-bold text-yellow-800 mb-2"><i class="fas fa-bolt mr-1"></i> เลขมิเตอร์ไฟวันออก</label>
                <input type="number" name="electric_meter" class="w-full text-sm border-gray-300 rounded-lg px-3 py-2 border bg-white" placeholder="หน่วย" required>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">หักค่าเสียหาย / ค่าทำความสะอาด (บาท)</label>
                <input type="number" name="damage_fee" class="w-full text-sm border-gray-300 rounded-lg focus:ring-red-500 px-4 py-2.5 border bg-red-50/30" placeholder="0">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">เงินประกันที่ต้องคืน (บาท) <span class="text-red-500">*</span></label>
                <input type="number" name="refund_deposit" class="w-full text-sm border-gray-300 rounded-lg focus:ring-red-500 px-4 py-2.5 border bg-green-50/30" placeholder="ระบุยอดเงิน" required>
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-bold text-gray-700 mb-1">หมายเหตุเพิ่มเติม</label>
                <textarea name="notes" class="w-full text-sm border-gray-300 rounded-lg focus:ring-red-500 px-4 py-2.5 border bg-gray-50" rows="3" placeholder="เช่น โอนเงินมัดจำคืนเข้าบัญชี..."></textarea>
            </div>
        </div>

        <div class="pt-6 flex justify-end space-x-3 mt-8 border-t border-gray-100">
            <a href="{% url 'check_in_out' %}" class="px-5 py-2.5 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 font-bold text-sm">ยกเลิก</a>
            <button type="submit" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2.5 rounded-lg font-bold text-sm flex items-center">
                <i class="fas fa-sign-out-alt mr-2"></i> ยืนยันการเช็คเอาท์
            </button>
        </div>
    </form>
</div>
{% endblock %}
