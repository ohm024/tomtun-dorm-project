{% extends 'base.html' %}

{% block content %}
<div class="mb-6">
    <a href="{% url 'rooms' %}" class="text-teal-600 hover:text-teal-700 text-sm mb-2 inline-block font-medium">
        <i class="fas fa-arrow-left mr-1"></i> กลับไปหน้าจัดการห้องพัก
    </a>
    <h2 class="text-2xl font-bold text-gray-800">เพิ่มห้องพักใหม่</h2>
    <p class="text-gray-500 text-sm mt-1">กำหนดหมายเลขห้อง ประเภท และราคาค่าเช่า</p>
</div>

<div class="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm max-w-3xl">
    <form action="{% url 'rooms' %}" method="GET" class="space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="md:col-span-2 border-b border-gray-100 pb-2">
                <h3 class="text-lg font-bold text-gray-800"><i class="fas fa-door-open text-teal-600 mr-2"></i>ข้อมูลพื้นฐานห้องพัก</h3>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">เลขห้อง <span class="text-red-500">*</span></label>
                <input type="text" class="w-full text-sm border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 px-4 py-2.5 border bg-gray-50" placeholder="เช่น 101, 102, 201" required>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">ประเภทห้องพัก <span class="text-red-500">*</span></label>
                <select class="w-full text-sm border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 px-4 py-2.5 border bg-white" required>
                    <option value="Standard">Standard (พัดลม)</option>
                    <option value="Deluxe">Deluxe (แอร์)</option>
                    <option value="Suite">Suite (ห้องใหญ่+แอร์)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">ราคาค่าเช่า (บาท/เดือน) <span class="text-red-500">*</span></label>
                <input type="number" class="w-full text-sm border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 px-4 py-2.5 border bg-gray-50" placeholder="เช่น 4500" required>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">สถานะเริ่มต้น <span class="text-red-500">*</span></label>
                <select class="w-full text-sm border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 px-4 py-2.5 border bg-white" required>
                    <option value="ว่าง">ว่าง</option>
                    <option value="ซ่อมแซม">ซ่อมแซม</option>
                </select>
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-bold text-gray-700 mb-1">รายละเอียดเฟอร์นิเจอร์ / หมายเหตุ</label>
                <textarea class="w-full text-sm border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 px-4 py-2.5 border bg-gray-50" rows="3" placeholder="เช่น มีเตียง 5 ฟุต, ตู้เสื้อผ้า, โต๊ะเครื่องแป้ง"></textarea>
            </div>
        </div>

        <div class="pt-6 flex justify-end space-x-3 mt-8">
            <a href="{% url 'rooms' %}" class="px-5 py-2.5 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors font-bold text-sm">
                ยกเลิก
            </a>
            <button type="submit" class="bg-teal-600 hover:bg-teal-700 text-white px-6 py-2.5 rounded-lg font-bold transition-colors shadow-sm text-sm flex items-center">
                <i class="fas fa-save mr-2"></i> บันทึกข้อมูล
            </button>
        </div>
        
    </form>
</div>
{% endblock %}
